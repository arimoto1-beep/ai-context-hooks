# Context Hook Template (YAML)
# 使い方: このファイルをコピーして、{{}} の部分を埋めてください。
# コメント行（#で始まる行）は削除して使用してください。

id: "{{ctx-YYYYMMDD-NNN}}"
# 例: ctx-20260614-001

source: "{{原文ファイル名・URL・チャンネル名など}}"
# 例: examples/raw/2026-06-14_meeting.md（00:12:01〜00:13:30）
# 例: #general Slack 2026-06-14 14:35
# 必須項目。原文に戻れない索引メモは意味を持ちません。

topic: "{{何の話か、短く}}"
# 例: CSV出力機能の扱い

related:
  - "{{関連する機能・資料・過去メモ（任意）}}"
  # 例: データエクスポート設計
  # 例: ctx-20260610-002（前回の関連メモ）

labels:
  - "{{ラベル1}}"
  - "{{ラベル2（任意）}}"
  # 選択肢（複数可）:
  #   決定        - 明確に決まったこと
  #   未決        - まだ決まっていないこと
  #   懸念        - 課題・リスクとして挙がったこと
  #   対象外      - 今回のスコープ外にしたこと
  #   将来再検討  - 今回はやらないが将来扱う可能性があること
  #   要望        - 誰かが「欲しい」と言ったこと（決定ではない）
  #   設計懸念    - 実装上の懸念・注意点として出てきたこと
  #   確認待ち    - 別途確認が必要なこと
  #   却下案      - 検討されたが採用しないことになった案
  #   雑談        - 参考情報・脱線・背景として出た話

confidence: "{{high / medium / low}}"
# high   - 原文に明確な記述がある
# medium - 原文から読み取れるが、解釈が含まれる
# low    - 推測・ニュアンスの読み取り・確認が必要
# 迷ったときは low を選ぶこと

hook_note: |
  {{原文へ戻るための短いメモ。}}
  {{断定しすぎず、温度感を保って書く。}}
  {{「〜という方向の会話があった」「〜という懸念が出ていた」のように書く。}}
  {{未決・懸念・対象外を決定として書かない。}}

ai_usage:
  - "{{AIへの扱い方を具体的に書く}}"
  - "{{例: 仕様として直接採用しない}}"
  - "{{例: 判断前に必ず原文を確認すること}}"
  - "{{例: 設計レビューの観点として扱う}}"
  - "{{例: 未決事項として扱う}}"

cautions:
  - "{{誤用しやすいポイントを具体的に書く}}"
  - "{{例: 決定事項として扱わない}}"
  - "{{例: この索引メモだけで仕様判断をしないこと}}"
  - "{{例: 「今回対象外」を「永続的に不要」と解釈しないこと}}"
